name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode 15
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
      
    - name: Build and Archive
      run: |
        xcodebuild -project Wardrobe.xcodeproj -scheme Wardrobe archive -archivePath build/Wardrobe.xcarchive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
        
    - name: Export Archive
      run: |
        # Export the app from the archive
        mkdir -p build/export
        cp -R build/Wardrobe.xcarchive/Products/Applications/Wardrobe.app build/export/
        
    - name: Zip Application
      run: |
        cd build/export
        zip -r ../Wardrobe.zip Wardrobe.app
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/Wardrobe.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
